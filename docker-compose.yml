version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: hp_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: hp_redis

  ollama:
    image: ollama/ollama
    container_name: hp_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

  flask:
    build: .
    container_name: hp_api
    command: python app/main.py
    env_file: .env
    depends_on:
      - postgres

  worker:
    build: .
    container_name: hp_worker
    command: taskiq worker worker.worker:broker
    env_file: .env
    depends_on:
      - postgres
      - redis

  scheduler:
    build: .
    container_name: bluetooth-scheduler
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
    command: python -m app.scheduler
    network_mode: host            # Not strictly needed for scheduler
      # No privileged required

volumes:
  pgdata:
  ollama:
  scans:
  